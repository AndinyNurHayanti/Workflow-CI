name: Retrain Model

on:
  push:
    branches:
      - main

jobs:
  train:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install pandas
          pip install scikit-learn
          pip install mlflow
          pip install xgboost

      - name: Run MLProject
        run: |
          mlflow run MLProject --env-manager=local